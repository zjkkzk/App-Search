name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 授予 GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个 Pages 部署，不取消正在进行的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Secret 非空时追加到 .env 覆盖默认值；未配置时保留仓库已提交的 .env 原始值
      - name: Override .env from Secrets (optional)
        env:
          _URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          _AID: ${{ secrets.EXPO_PUBLIC_APP_ID }}
        run: |
          [ -n "$_URL" ] && echo "EXPO_PUBLIC_SUPABASE_URL=$_URL" >> .env || true
          [ -n "$_KEY" ] && echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$_KEY" >> .env || true
          [ -n "$_AID" ] && echo "EXPO_PUBLIC_APP_ID=$_AID"          >> .env || true

      - name: Export web (Expo → dist/)
        run: npx expo export --platform web
        env:
          CI: true

      # GitHub Pages 是纯静态托管，不支持服务端路由重写。
      # 将 index.html 复制为 404.html，使任意路径刷新/直接访问时
      # 都由 SPA 自身接管路由，而不是返回 GitHub 的默认 404 页面。
      - name: Add 404.html for SPA routing fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
