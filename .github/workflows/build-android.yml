name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Secret 非空时追加到 .env 覆盖默认值；未配置时保留仓库已提交的 .env 原始值
      - name: Override .env from Secrets (optional)
        env:
          _URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          _AID: ${{ secrets.EXPO_PUBLIC_APP_ID }}
        run: |
          [ -n "$_URL" ] && echo "EXPO_PUBLIC_SUPABASE_URL=$_URL" >> .env || true
          [ -n "$_KEY" ] && echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$_KEY" >> .env || true
          [ -n "$_AID" ] && echo "EXPO_PUBLIC_APP_ID=$_AID"          >> .env || true

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install
        env:
          CI: true

      - name: Fix Gradle network timeout and add China mirrors
        run: |
          # Fix network timeout (10s -> 120s)
          sed -i 's/networkTimeout=10000/networkTimeout=120000/' android/gradle/wrapper/gradle-wrapper.properties

          # Add Aliyun mirrors to build.gradle
          python3 << 'PYEOF'
          import re

          path = 'android/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          # Add aliyun mirrors to buildscript repositories
          if 'maven.aliyun.com' not in content:
              # 用双引号，避免 \' 被注入 Groovy 后产生语法错误
              aliyun_google = '    maven { url "https://maven.aliyun.com/repository/google" }'
              aliyun_public = '    maven { url "https://maven.aliyun.com/repository/public" }'
              aliyun_plugin = '    maven { url "https://maven.aliyun.com/repository/gradle-plugin" }'

              # buildscript repos
              content = re.sub(
                  r'(buildscript\s*\{\s*repositories\s*\{)',
                  r'\1' + '\n' + aliyun_google + '\n' + aliyun_public + '\n' + aliyun_plugin,
                  content
              )
              # allprojects repos
              content = re.sub(
                  r'(allprojects\s*\{\s*repositories\s*\{)',
                  r'\1' + '\n' + aliyun_google + '\n' + aliyun_public,
                  content
              )

          with open(path, 'w') as f:
              f.write(content)
          print("Added Aliyun mirrors to android/build.gradle")
          PYEOF

      - name: Force arm64-v8a only (strip all other ABIs)
        run: |
          python3 << 'PYEOF'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          def find_block_end(text, start):
              """从 start 处的第一个 '{' 开始，返回配对 '}' 的位置"""
              depth = 0
              i = start
              while i < len(text):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return i
                  i += 1
              return len(text) - 1

          # ── 1. ndk { abiFilters } ────────────────────────────────────────────
          m = re.search(r'ndk\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + 'ndk { abiFilters "arm64-v8a" }' + content[end + 1:]
          else:
              content = content.replace(
                  'defaultConfig {',
                  'defaultConfig {\n        ndk { abiFilters "arm64-v8a" }',
                  1
              )

          # ── 2. splits { abi { ... } } ────────────────────────────────────────
          splits_block = (
              '    splits {\n'
              '        abi {\n'
              '            enable true\n'
              '            reset()\n'
              '            include "arm64-v8a"\n'
              '            universalApk false\n'
              '        }\n'
              '    }'
          )
          m = re.search(r'splits\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + splits_block.strip() + content[end + 1:]
          else:
              m_android = re.search(r'android\s*\{', content)
              if m_android:
                  end = find_block_end(content, m_android.start())
                  content = content[:end] + '\n' + splits_block + '\n' + content[end:]

          # ── 3. packagingOptions { ... }（大括号计数，避免嵌套块误截断）─────────
          packaging_block = (
              '    packagingOptions {\n'
              '        jniLibs { useLegacyPackaging = true }\n'
              '        excludes += [\n'
              '            "lib/armeabi-v7a/**",\n'
              '            "lib/x86/**",\n'
              '            "lib/x86_64/**"\n'
              '        ]\n'
              '    }'
          )
          m = re.search(r'packagingOptions\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + packaging_block.strip() + content[end + 1:]
          else:
              m_android = re.search(r'android\s*\{', content)
              if m_android:
                  end = find_block_end(content, m_android.start())
                  content = content[:end] + '\n' + packaging_block + '\n' + content[end:]

          with open(path, 'w') as f:
              f.write(content)

          # 验证
          print("=== ABI filter verification ===")
          for i, line in enumerate(content.split('\n'), 1):
              if any(k in line for k in ['abiFilter', 'ndk {', 'splits', 'include "arm64', 'universalApk', 'packagingOptions', 'jniLibs', 'excludes']):
                  print(f"  L{i}: {line.strip()}")
          print("=== Done ===")
          PYEOF

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=OpenAppSearch, OU=Mobile, O=Miaoda, L=Beijing, ST=Beijing, C=CN"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android123
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 每次 push main：更新 latest 滚动预发布版 ──────────────────────────
      - name: Rename APK with commit SHA (main push)
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${DATE}-${SHORT_SHA}.apk

      - name: Publish latest rolling release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          make_latest: false
          body: |
            🤖 **自动构建** — 最新 main 分支 APK

            - Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - 构建时间：${{ github.event.head_commit.timestamp }}
            - 消息：${{ github.event.head_commit.message }}

            > 此为滚动预发布版，每次 push 自动覆盖。正式版请关注 `v*` 标签 Release。
          files: android/app/build/outputs/apk/release/*.apk

      # ── push v* 标签：创建正式版本 Release ───────────────────────────────
      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${{ github.ref_name }}
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${TAG}.apk

      - name: Create versioned GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: android/app/build/outputs/apk/release/*.apk

