name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Secret 非空时追加到 .env 覆盖默认值；未配置时保留仓库已提交的 .env 原始值
      - name: Override .env from Secrets (optional)
        env:
          _URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          _AID: ${{ secrets.EXPO_PUBLIC_APP_ID }}
        run: |
          [ -n "$_URL" ] && echo "EXPO_PUBLIC_SUPABASE_URL=$_URL" >> .env || true
          [ -n "$_KEY" ] && echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$_KEY" >> .env || true
          [ -n "$_AID" ] && echo "EXPO_PUBLIC_APP_ID=$_AID"          >> .env || true

      - name: Set versionCode + auto-increment patch version
        run: |
          python3 -c "
          import json
          with open('app.json', 'r') as f:
              data = json.load(f)
          run = ${{ github.run_number }}
          # versionCode = run_number（单调递增，Android 覆盖安装依赖此字段）
          data['expo']['android']['versionCode'] = run
          # version = 1.0.{run_number}，每次构建唯一，永不重复
          data['expo']['version'] = f'1.0.{run}'
          with open('app.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f'version=1.0.{run}  versionCode={run}')
          "

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install
        env:
          CI: true

      - name: Force arm64-v8a only (ndk abiFilters only, no splits conflict)
        run: |
          python3 << 'PYEOF'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          def find_block_end(text, start):
              depth = 0
              i = start
              while i < len(text):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return i
                  i += 1
              return len(text) - 1

          # ── 1. ndk { abiFilters "arm64-v8a" } ────────────────────────────────
          # NOTE: Do NOT add splits{} alongside ndk abiFilters — they conflict in RN gradle plugin
          m = re.search(r'ndk\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + 'ndk { abiFilters "arm64-v8a" }' + content[end + 1:]
          else:
              content = content.replace(
                  'defaultConfig {',
                  'defaultConfig {\n        ndk { abiFilters "arm64-v8a" }',
                  1
              )

          # ── 2. Remove any existing splits{} block to avoid conflict ───────────
          m = re.search(r'\s*splits\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + content[end + 1:]

          with open(path, 'w') as f:
              f.write(content)

          # 验证
          print("=== ABI filter verification ===")
          for i, line in enumerate(content.split('\n'), 1):
              if any(k in line for k in ['abiFilter', 'ndk {', 'splits', 'include "arm64']):
                  print(f"  L{i}: {line.strip()}")
          print("=== Done ===")
          PYEOF

      - name: Restore stable release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
          echo "Keystore restored: $(wc -c < ${{ github.workspace }}/release.keystore) bytes"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_STORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_KEY_PASS }}"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 找到构建产物，统一校验 APK 存在 ─────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found!" && exit 1
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "✅ APK: $APK ($(du -sh "$APK" | cut -f1))"

      # ── push main：滚动更新 latest Release ──────────────────────────────
      - name: Rename APK for latest release
        if: github.ref == 'refs/heads/main'
        id: rename_latest
        run: |
          VERSION="1.0.${{ github.run_number }}"
          DEST="android/app/build/outputs/apk/release/openappstore.${VERSION}.apk"
          mv "${{ steps.apk.outputs.path }}" "$DEST"
          echo "name=openappstore.${VERSION}.apk" >> $GITHUB_OUTPUT
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - name: Publish latest Release (main push)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="1.0.${{ github.run_number }}"
          APK="${{ steps.rename_latest.outputs.path }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # 原子操作：先删旧 Release + Tag，再创建新的
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          gh release create latest "$APK" \
            --title "Latest Stable — v${VERSION}" \
            --notes "$(cat <<'NOTES'
          ✅ **main 分支最新稳定构建**

          | 字段 | 值 |
          |------|-----|
          | Commit | [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | 版本号 | v'"${VERSION}"' |
          | 构建编号 | #${{ github.run_number }} |
          | 提交信息 | '"$COMMIT_MSG"' |
          | 构建时间 | '"$(date -u +'%Y-%m-%d %H:%M UTC')"' |

          > 此 Release 始终对应 main 分支最新成功构建，旧版 APK 请在 [Actions Artifacts](/${{ github.repository }}/actions) 中获取。
          NOTES
          )" \
            --target "${{ github.sha }}" \
            --latest

      # ── push v* 标签：创建带版本号的正式 Release ────────────────────────
      - name: Rename APK for versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        id: rename_versioned
        run: |
          TAG="${{ github.ref_name }}"
          DEST="android/app/build/outputs/apk/release/openappstore-${TAG}.apk"
          mv "${{ steps.apk.outputs.path }}" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - name: Create versioned Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          APK="${{ steps.rename_versioned.outputs.path }}"

          gh release create "$TAG" "$APK" \
            --title "Release ${TAG}" \
            --generate-notes \
            --latest



