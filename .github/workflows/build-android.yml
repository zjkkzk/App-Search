name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Secret 非空时追加到 .env 覆盖默认值；未配置时保留仓库已提交的 .env 原始值
      - name: Override .env from Secrets (optional)
        env:
          _URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          _AID: ${{ secrets.EXPO_PUBLIC_APP_ID }}
        run: |
          [ -n "$_URL" ] && echo "EXPO_PUBLIC_SUPABASE_URL=$_URL" >> .env || true
          [ -n "$_KEY" ] && echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$_KEY" >> .env || true
          [ -n "$_AID" ] && echo "EXPO_PUBLIC_APP_ID=$_AID"          >> .env || true

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install
        env:
          CI: true

      - name: Force arm64-v8a only (strip all other ABIs)
        run: |
          python3 << 'PYEOF'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          original = content

          # ── 1. 强制替换 ndk { abiFilters ... } 块（不管已有什么内容）──────────
          # 匹配 ndk { ... } 整块（单行或多行）并替换为只保留 arm64-v8a
          content = re.sub(
              r'ndk\s*\{[^}]*\}',
              'ndk { abiFilters "arm64-v8a" }',
              content
          )
          # 若原文件没有 ndk 块，则在 defaultConfig { 后插入
          if 'ndk {' not in content:
              content = content.replace(
                  'defaultConfig {',
                  'defaultConfig {\n        ndk { abiFilters "arm64-v8a" }',
                  1
              )

          # ── 2. 强制替换 / 插入 splits 块（最可靠的 ABI 分割方式）────────────
          splits_block = '''    splits {
              abi {
                  enable true
                  reset()
                  include "arm64-v8a"
                  universalApk false
              }
          }'''
          if re.search(r'splits\s*\{', content):
              content = re.sub(r'splits\s*\{.*?\}(\s*\})', splits_block + r'\1', content, flags=re.DOTALL)
          else:
              # 插入到 android { 块末尾（最后一个 } 之前）
              content = re.sub(r'(android\s*\{)', r'\1\n' + splits_block, content, count=1)

          # ── 3. 强制替换 / 插入 packagingOptions（删除非 arm64 .so）───────────
          packaging_block = '''    packagingOptions {
              jniLibs { useLegacyPackaging = true }
              excludes += [
                  "lib/armeabi-v7a/**",
                  "lib/x86/**",
                  "lib/x86_64/**"
              ]
          }'''
          if re.search(r'packagingOptions\s*\{', content):
              content = re.sub(r'packagingOptions\s*\{.*?\}', packaging_block, content, flags=re.DOTALL)
          else:
              content = re.sub(r'(android\s*\{)', r'\1\n' + packaging_block, content, count=1)

          with open(path, 'w') as f:
              f.write(content)

          # 验证输出
          print("=== ABI filter verification ===")
          for i, line in enumerate(content.split('\n'), 1):
              if any(kw in line for kw in ['abiFilter', 'ndk {', 'splits', 'include "arm64', 'universalApk', 'exclude', 'packagingOptions']):
                  print(f"  L{i}: {line.strip()}")
          print("=== Done ===")
          PYEOF

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=OpenAppSearch, OU=Mobile, O=Miaoda, L=Beijing, ST=Beijing, C=CN"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android123
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 每次 push main：更新 latest 滚动预发布版 ──────────────────────────
      - name: Rename APK with commit SHA (main push)
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${DATE}-${SHORT_SHA}.apk

      - name: Publish latest rolling release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          make_latest: false
          body: |
            🤖 **自动构建** — 最新 main 分支 APK

            - Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - 构建时间：${{ github.event.head_commit.timestamp }}
            - 消息：${{ github.event.head_commit.message }}

            > 此为滚动预发布版，每次 push 自动覆盖。正式版请关注 `v*` 标签 Release。
          files: android/app/build/outputs/apk/release/*.apk

      # ── push v* 标签：创建正式版本 Release ───────────────────────────────
      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${{ github.ref_name }}
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${TAG}.apk

      - name: Create versioned GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: android/app/build/outputs/apk/release/*.apk
