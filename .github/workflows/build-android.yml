name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Secret 非空时追加到 .env 覆盖默认值；未配置时保留仓库已提交的 .env 原始值
      - name: Override .env from Secrets (optional)
        env:
          _URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          _AID: ${{ secrets.EXPO_PUBLIC_APP_ID }}
        run: |
          [ -n "$_URL" ] && echo "EXPO_PUBLIC_SUPABASE_URL=$_URL" >> .env || true
          [ -n "$_KEY" ] && echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$_KEY" >> .env || true
          [ -n "$_AID" ] && echo "EXPO_PUBLIC_APP_ID=$_AID"          >> .env || true

      - name: Set versionCode + auto-increment patch version
        run: |
          python3 -c "
          import json
          with open('app.json', 'r') as f:
              data = json.load(f)
          # versionCode = run_number（单调递增整数）
          data['expo']['android']['versionCode'] = ${{ github.run_number }}
          # version patch 自动递增：1.0.0 → 1.0.1 → 1.0.2 ...
          ver = data['expo'].get('version', '1.0.0').split('.')
          ver[2] = str(int(ver[2]) + 1)
          new_ver = '.'.join(ver)
          data['expo']['version'] = new_ver
          with open('app.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f'version={new_ver}  versionCode=${{ github.run_number }}')
          "

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install
        env:
          CI: true

      - name: Force arm64-v8a only (ndk abiFilters only, no splits conflict)
        run: |
          python3 << 'PYEOF'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          def find_block_end(text, start):
              depth = 0
              i = start
              while i < len(text):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return i
                  i += 1
              return len(text) - 1

          # ── 1. ndk { abiFilters "arm64-v8a" } ────────────────────────────────
          # NOTE: Do NOT add splits{} alongside ndk abiFilters — they conflict in RN gradle plugin
          m = re.search(r'ndk\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + 'ndk { abiFilters "arm64-v8a" }' + content[end + 1:]
          else:
              content = content.replace(
                  'defaultConfig {',
                  'defaultConfig {\n        ndk { abiFilters "arm64-v8a" }',
                  1
              )

          # ── 2. Remove any existing splits{} block to avoid conflict ───────────
          m = re.search(r'\s*splits\s*\{', content)
          if m:
              end = find_block_end(content, m.start())
              content = content[:m.start()] + content[end + 1:]

          with open(path, 'w') as f:
              f.write(content)

          # 验证
          print("=== ABI filter verification ===")
          for i, line in enumerate(content.split('\n'), 1):
              if any(k in line for k in ['abiFilter', 'ndk {', 'splits', 'include "arm64']):
                  print(f"  L{i}: {line.strip()}")
          print("=== Done ===")
          PYEOF

      - name: Restore stable release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
          echo "Keystore restored: $(wc -c < ${{ github.workspace }}/release.keystore) bytes"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_STORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_KEY_PASS }}"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 每次 push main：发布正式版 Release（覆盖 latest） ─────────────────
      - name: Rename APK with commit SHA (main push)
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${DATE}-${SHORT_SHA}.apk

      - name: Delete old latest release + tag (main push)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 删除旧 release（忽略不存在时的错误）
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/latest --jq '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
            echo "Deleted release id=$RELEASE_ID"
          fi
          # 删除旧 tag
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true
          echo "Deleted tag latest (if existed)"

      - name: Publish stable release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Stable Build"
          prerelease: false
          make_latest: true
          body: |
            ✅ **正式构建** — main 分支最新稳定版 APK

            - Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - 构建时间：${{ github.event.head_commit.timestamp }}
            - 消息：${{ github.event.head_commit.message }}
          files: android/app/build/outputs/apk/release/*.apk

      # ── push v* 标签：创建正式版本 Release ───────────────────────────────
      - name: Rename APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${{ github.ref_name }}
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/openappstore-${TAG}.apk

      - name: Create versioned GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: android/app/build/outputs/apk/release/*.apk



